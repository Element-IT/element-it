services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_transcriber
    ports:
      - "${DOCKER_BIND_ADDRESS:-0.0.0.0}:${N8N_HOST_PORT:-5678}:5678"
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - N8N_HOST=${N8N_PUBLIC_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PUBLIC_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_PUBLIC_URL:-http://localhost:5678}
      - WEBHOOK_URL=${N8N_PUBLIC_URL:-http://localhost:5678}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./data:/data
    restart: unless-stopped

  transcriber:
    build: ./transcriber
    container_name: whisper_transcriber_api
    ports:
      - "${DOCKER_BIND_ADDRESS:-0.0.0.0}:${TRANSCRIBER_HOST_PORT:-7861}:7861"
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - DATA_DIR=/data
      - TRANSCRIBER_PUBLIC_URL=${TRANSCRIBER_PUBLIC_URL:-http://localhost:7861}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./data:/data
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
